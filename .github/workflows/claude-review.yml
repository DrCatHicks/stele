name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]

# Skip on PRs from forks, where the OAuth token secret isn't available.
jobs:
  review:
    name: Claude · review
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review this pull request against the invariants in CLAUDE.md and the
            design in survey-engine-design-doc.md. Focus on: the append-only
            raw_responses contract, publish-time immutability, shown-set capture
            (no SQL-side routing reconstruction), PII default-high routing, and the
            no-silent-defaults rule for methodological judgments. Flag concerns;
            don't rubber-stamp.
