name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Postgres service superuser (used only to create the DB and apply init SQL).
  PGHOST: localhost
  PGPORT: "5432"
  PGUSER: postgres
  PGPASSWORD: postgres

jobs:
  python-lint:
    name: Python · lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  python-invariants:
    name: Python · invariants (check_invariants.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/check_invariants.py

  python-typecheck:
    name: Python · typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run mypy api/

  python-test:
    name: Python · test (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The API connects as the least-privileged writer role, not a superuser,
      # so missing grants fail CI here rather than hiding behind dev superuser.
      STELE_DATABASE_URL: postgresql+psycopg://stele_api:dev@localhost:5432/stele
      # The provisioning CLI (M3.5) needs role-DDL privilege, which stele_api
      # deliberately lacks. Point its elevated connection at the service superuser
      # so the CLI integration tests exercise the real CREATE ROLE / GRANT path in
      # CI instead of skipping. This is *test* wiring — in prod the operator runs
      # the CLI with a dedicated CREATEROLE role, never the app's connection.
      STELE_PROVISION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stele
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - name: Provision database (schemas, roles, grants)
        run: |
          psql -c "CREATE DATABASE stele;"
          psql -v ON_ERROR_STOP=1 -d postgres -f .devcontainer/postgres-init/01-schemas-and-roles.sql
      - name: Migrate
        # Run migrations as the service superuser so the schema default
        # privileges defined in the init SQL apply to the created tables.
        working-directory: api
        env:
          STELE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/stele
        run: uv run alembic upgrade head
      - run: uv run pytest

  ts-lint:
    name: TypeScript · lint (eslint + prettier)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  ts-typecheck:
    name: TypeScript · typecheck (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  ts-test:
    name: TypeScript · test (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  ts-build:
    name: TypeScript · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  dbt:
    name: dbt · parse & compile
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DBT_HOST: localhost
      DBT_USER: stele_etl
      DBT_PASSWORD: dev
      DBT_DBNAME: stele
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - name: Provision database (schemas, roles, grants)
        run: |
          psql -c "CREATE DATABASE stele;"
          psql -v ON_ERROR_STOP=1 -d postgres -f .devcontainer/postgres-init/01-schemas-and-roles.sql
      - name: Migrate + seed (as superuser, so init default privileges apply)
        # Tables created by postgres → the init SQL's default-privilege grants
        # give stele_api its app/pii writes. stele_etl's SELECT is least-privilege:
        # the etl-app-least-privilege migration grants it raw_responses only (its
        # sole dbt source), not schema-wide — so the dbt build below proves the
        # grant is sufficient. The seed exercises the real write path so the build
        # has data across all three routing states.
        env:
          STELE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/stele
        run: |
          (cd api && uv run alembic upgrade head)
          uv run python scripts/seed_example_survey.py
      - name: dbt parse & compile
        working-directory: dbt
        run: |
          uv run dbt parse --profiles-dir .
          uv run dbt compile --profiles-dir .
      - name: ETL run (the FR-11 command — `dbt build` + ops.etl_runs logging)
        # Exercise the operational entry point, not a bare `dbt build`: the runner
        # connects as stele_etl, builds the marts (running the custom invariant
        # tests), then logs the run to ops.etl_runs and archives the dbt artifacts.
        # This proves the run-logging grants and the full FR-11 path on a fresh DB,
        # not just via the dbt-stubbed integration tests. Run from the repo root —
        # the runner sets the dbt working dir itself and reads git_sha from here.
        env:
          STELE_ETL_DATABASE_URL: postgresql://stele_etl:dev@localhost:5432/stele
        run: uv run python scripts/run_etl.py
