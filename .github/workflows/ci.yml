name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for every job: read the repo, nothing more. Jobs that
# need more (the docker-build cache) opt in explicitly.
permissions:
  contents: read

env:
  # Postgres service superuser (used only to create the DB and apply init SQL).
  PGHOST: localhost
  PGPORT: "5432"
  PGUSER: postgres
  PGPASSWORD: postgres

jobs:
  python-lint:
    name: Python · lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  python-invariants:
    name: Python · invariants (check_invariants.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/check_invariants.py

  python-typecheck:
    name: Python · typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run mypy api/

  python-test:
    name: Python · test (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The API connects as the least-privileged writer role, not a superuser,
      # so missing grants fail CI here rather than hiding behind dev superuser.
      STELE_DATABASE_URL: postgresql+psycopg://stele_api:dev@localhost:5432/stele
      # The provisioning CLI (M3.5) needs role-DDL privilege, which stele_api
      # deliberately lacks. Point its elevated connection at the service superuser
      # so the CLI integration tests exercise the real CREATE ROLE / GRANT path in
      # CI instead of skipping. This is *test* wiring — in prod the operator runs
      # the CLI with a dedicated CREATEROLE role, never the app's connection.
      STELE_PROVISION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stele
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - name: Provision database (schemas, roles, grants)
        run: |
          psql -c "CREATE DATABASE stele;"
          psql -v ON_ERROR_STOP=1 -d stele -f .devcontainer/postgres-init/01-roles.sql
          psql -v ON_ERROR_STOP=1 -d stele -f .devcontainer/postgres-init/02-schemas-and-grants.sql
      - name: Migrate
        # Run migrations as the service superuser so the schema default
        # privileges defined in the init SQL apply to the created tables.
        working-directory: api
        env:
          STELE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/stele
        run: uv run alembic upgrade head
      - run: uv run pytest

  ts-lint:
    name: TypeScript · lint (eslint + prettier)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  ts-typecheck:
    name: TypeScript · typecheck (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  ts-test:
    name: TypeScript · test (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  ts-build:
    name: TypeScript · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  dbt:
    name: dbt · parse & compile
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DBT_HOST: localhost
      DBT_USER: stele_etl
      DBT_PASSWORD: dev
      DBT_DBNAME: stele
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - name: Provision database (schemas, roles, grants)
        run: |
          psql -c "CREATE DATABASE stele;"
          psql -v ON_ERROR_STOP=1 -d stele -f .devcontainer/postgres-init/01-roles.sql
          psql -v ON_ERROR_STOP=1 -d stele -f .devcontainer/postgres-init/02-schemas-and-grants.sql
      - name: Migrate + seed (as superuser, so init default privileges apply)
        # Tables created by postgres → the init SQL's default-privilege grants
        # give stele_api its app/pii writes. stele_etl's SELECT is least-privilege:
        # the etl-app-least-privilege migration grants it raw_responses only (its
        # sole dbt source), not schema-wide — so the dbt build below proves the
        # grant is sufficient. The seed exercises the real write path so the build
        # has data across all three routing states.
        env:
          STELE_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/stele
        run: |
          (cd api && uv run alembic upgrade head)
          uv run python scripts/seed_example_survey.py
      - name: dbt parse & compile
        working-directory: dbt
        run: |
          uv run dbt parse --profiles-dir .
          uv run dbt compile --profiles-dir .
      - name: ETL run (the FR-11 command — `dbt build` + ops.etl_runs logging)
        # Exercise the operational entry point, not a bare `dbt build`: the runner
        # connects as stele_etl, builds the marts (running the custom invariant
        # tests), then logs the run to ops.etl_runs and archives the dbt artifacts.
        # This proves the run-logging grants and the full FR-11 path on a fresh DB,
        # not just via the dbt-stubbed integration tests. Run from the repo root —
        # the runner sets the dbt working dir itself and reads git_sha from here.
        env:
          STELE_ETL_DATABASE_URL: postgresql://stele_etl:dev@localhost:5432/stele
        run: uv run python scripts/run_etl.py

  prod-bootstrap-sim:
    name: Python · prod bootstrap sim (non-superuser admin)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    # Dev/CI bootstrap as the cluster SUPERUSER, which hides grant bugs that only
    # bite under the non-superuser owner a managed Postgres (Railway, RDS, Cloud
    # SQL) hands you. This job rehearses the real prod path: a CREATEROLE-but-not-
    # superuser admin that OWNS its database is the single identity that bootstraps
    # the roles from secrets AND runs migrations (bootstrap-er == migrator), then
    # the least-privilege roles do their real work. It proves the split init SQL,
    # bootstrap_roles.py, the grantor-guarded least-privilege migration, and the
    # marts FOR ROLE default privilege all hold without a superuser.
    env:
      STELE_API_PASSWORD: testapipw
      STELE_ETL_PASSWORD: testetlpw
      STELE_ANALYST_PASSWORD: testanalystpw
      STELE_PII_REVIEWER_PASSWORD: testreviewerpw
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - name: Create non-superuser admin + its database (simulates managed PG)
        # CREATEROLE (mints the four roles) but NOT superuser; OWNER of stele_prod
        # gives it CREATE on the database, like a managed-PG owner role.
        run: |
          psql -v ON_ERROR_STOP=1 -c "CREATE ROLE stele_admin LOGIN CREATEROLE PASSWORD 'adminpw';"
          psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE stele_prod OWNER stele_admin;"
      - name: Bootstrap roles, schemas, grants as the admin
        # Use STELE_ADMIN_DATABASE_URL (the M7.4 admin-connection var) so this
        # rehearses the Railway path, where the web service carries the admin
        # connection on this var and stele_api on STELE_DATABASE_URL.
        env:
          STELE_ADMIN_DATABASE_URL: postgresql+psycopg://stele_admin:adminpw@localhost:5432/stele_prod
        run: uv run python scripts/bootstrap_roles.py
      - name: Migrate as the SAME admin (bootstrap-er == migrator; proves the admin-URL decouple)
        # Set BOTH vars as a real deploy does: the admin connection on
        # STELE_ADMIN_DATABASE_URL and the least-privilege stele_api connection on
        # STELE_DATABASE_URL. Alembic must prefer the admin var — if it fell back to
        # STELE_DATABASE_URL (stele_api), CREATE TABLE would be denied and this step
        # would fail. So a green migrate proves the M7.4 precedence end-to-end.
        working-directory: api
        env:
          STELE_ADMIN_DATABASE_URL: postgresql+psycopg://stele_admin:adminpw@localhost:5432/stele_prod
          STELE_DATABASE_URL: postgresql+psycopg://stele_api:testapipw@localhost:5432/stele_prod
        run: uv run alembic upgrade head
      - name: Seed as stele_api (proves the app role's writes under non-superuser bootstrap)
        env:
          STELE_DATABASE_URL: postgresql+psycopg://stele_api:testapipw@localhost:5432/stele_prod
        run: uv run python scripts/seed_example_survey.py
      - name: ETL as stele_etl (proves marts build + FOR ROLE default privilege → analyst)
        env:
          STELE_ETL_DATABASE_URL: postgresql://stele_etl:testetlpw@localhost:5432/stele_prod
          DBT_HOST: localhost
          DBT_USER: stele_etl
          DBT_PASSWORD: testetlpw
          DBT_DBNAME: stele_prod
        run: uv run python scripts/run_etl.py
      - name: Assert least-privilege boundaries hold under non-superuser bootstrap
        run: |
          set -euo pipefail
          echo "stele_etl reads its sole declared source (app.raw_responses):"
          PGPASSWORD=testetlpw psql -v ON_ERROR_STOP=1 -U stele_etl -d stele_prod \
            -c "SELECT count(*) FROM app.raw_responses;"
          echo "stele_etl is DENIED operator secrets (default-deny on app):"
          if PGPASSWORD=testetlpw psql -v ON_ERROR_STOP=1 -U stele_etl -d stele_prod \
               -c "SELECT 1 FROM app.users;" >/dev/null 2>&1; then
            echo "FAIL: stele_etl can read app.users"; exit 1
          fi
          echo "  denied as expected."
          echo "stele_analyst reads a dbt-built marts table (FOR ROLE default priv held):"
          PGPASSWORD=testanalystpw psql -v ON_ERROR_STOP=1 -U stele_analyst -d stele_prod \
            -c "SELECT count(*) FROM marts.fact_response_item;"

  docker-build:
    name: Docker · build production image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # read/write the buildx layer cache (type=gha)
      packages: write # push the prebuilt image to GHCR on main (D7)
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build the production image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: stele:ci
          # GIT_SHA is the ETL run-provenance source in the image (no git binary,
          # and RAILWAY_GIT_COMMIT_SHA isn't injected into image-based deploys —
          # only repo-built ones). Bake it here so the same arg keys the cache the
          # push step reuses, and so the pushed image carries real provenance.
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test composition (runtimes + assets, no DB)
        # The image is mostly-Python on a Node base because the publish gate runs
        # the Node round-trip oracle at request time. Prove both runtimes, dbt +
        # alembic, the built SPA, the oracle's survey-core, and that the app
        # actually imports (which also resolves STELE_FRONTEND_DIST). No DB needed:
        # create_async_engine is lazy, so `import api.main` doesn't connect.
        run: |
          docker run --rm --entrypoint bash stele:ci -c '
            set -euo pipefail
            python --version
            node --version
            uvicorn --version
            alembic --version
            dbt --version
            test -f /app/frontend/dist/index.html
            test -d /app/frontend/node_modules/survey-core
            test -f /app/frontend/scripts/roundTrip.mjs
            # The migrate entrypoint bootstraps roles+grants before alembic, and
            # bootstrap_roles.py applies this shared SQL by its repo-relative path —
            # it must be present in the image or migrate fails before Alembic.
            test -f /app/.devcontainer/postgres-init/02-schemas-and-grants.sql
            python -c "import api.main"
          '
      - name: Entrypoint dispatch resolves (print mode)
        run: |
          set -euo pipefail
          docker run --rm -e STELE_ENTRYPOINT_PRINT=1 stele:ci web     | grep -q 'uvicorn api.main:app'
          docker run --rm -e STELE_ENTRYPOINT_PRINT=1 stele:ci migrate | grep -q 'alembic upgrade head'
          docker run --rm -e STELE_ENTRYPOINT_PRINT=1 stele:ci etl     | grep -q 'scripts/run_etl.py'
          docker run --rm -e STELE_ENTRYPOINT_PRINT=1 stele:ci seed    | grep -q 'scripts/bootstrap_admin.py'
          # The ETL cron service selects its verb with STELE_ENTRYPOINT=etl (image
          # deploys can't set a start-command override via the OpenTofu provider),
          # and the web service migrates on start in place of railway.json's
          # preDeployCommand. Prove both stand-ins resolve (D7).
          docker run --rm -e STELE_ENTRYPOINT_PRINT=1 -e STELE_ENTRYPOINT=etl stele:ci         | grep -q 'scripts/run_etl.py'
          docker run --rm -e STELE_ENTRYPOINT_PRINT=1 -e STELE_MIGRATE_ON_START=1 stele:ci web | grep -q 'uvicorn api.main:app'

      - name: Log in to GHCR
        # On main only — the push step below publishes the prebuilt image. The
        # workflow's GITHUB_TOKEN with packages:write authenticates to the repo's
        # own ghcr.io namespace; no separate PAT needed.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push the prebuilt image to GHCR
        # On main only: the CI build is the authoritative artifact both Railway
        # services pull (D7 — build once, run the tested bytes everywhere). PRs
        # build + smoke-test but never push. cache-from=gha makes this a near-instant
        # re-export of the layers the build step above already produced.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :main is the floating tag the OpenTofu module references by default;
          # :<sha> is the immutable tag for a pinned, reproducible rollout
          # (tofu apply -var image_tag=<sha>).
          tags: |
            ghcr.io/${{ github.repository }}:main
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Railway redeploy
        # Optional auto-deploy (D7): re-pull the just-pushed :main image on both
        # services so a merge to main goes live without a manual `tofu apply`.
        # DORMANT until the RAILWAY_TOKEN repo secret is set — the env.RAILWAY_TOKEN
        # guard skips the step when it's empty (you can't test secrets.* directly in
        # `if:`), so CI stays green and `tofu apply` remains the deploy path in the
        # meantime. This is a PROJECT token (the CLI reads RAILWAY_TOKEN as such),
        # distinct from the workspace token tofu uses — see infra/README.md.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.RAILWAY_TOKEN != ''
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          npm i -g @railway/cli
          # --yes skips the interactive confirm; redeploy re-pulls the current image
          # tag (:main) the services already reference, so it picks up the new push.
          railway redeploy --service web --yes
          railway redeploy --service etl --yes

  infra:
    name: Infra · OpenTofu (fmt + validate)
    runs-on: ubuntu-latest
    # The deployment module is validated, not applied — there's no Railway account
    # or token in CI (same CI-only posture as the Docker image and role bootstrap).
    # fmt -check pins formatting; init -backend=false + validate prove the config is
    # well-formed and type-checks against the real provider schema.
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - name: Format check
        run: tofu fmt -check -recursive infra/
      - name: Init + validate the Railway module
        working-directory: infra/railway
        run: |
          tofu init -backend=false
          tofu validate
