version: 2

# Surrogate keys are deterministic md5 hashes of natural keys (see
# macros/surrogate_key.sql), not the bigint sequences nominally shown in
# design-doc §3.5. Rationale: stable across full-refresh rebuilds, computable
# per-model without a shared sequence, portable to DuckDB, dependency-free.

models:
  - name: dim_respondent
    columns:
      - name: respondent_id
        data_tests: [unique, not_null]

  - name: dim_survey_version
    columns:
      - name: survey_version_id
        data_tests: [unique, not_null]

  - name: dim_question
    columns:
      - name: question_id
        data_tests: [unique, not_null]
      - name: survey_id
        description: >
          The survey (instrument) this question belongs to. Part of the
          dim_question grain: question_id is keyed on (survey_id, stable_name), so
          a question pools across a survey's versions but never across surveys
          (invariant 5 — no silent cross-survey pooling). The question_id_survey_scoped
          singular test pins question_id to this key.
        data_tests: [not_null]
      - name: matrix_name
        description: >
          For a matrix cell sub-question (M5.3), the matrix element's own name —
          the entry in the captured shown-set that governs the sub-question's
          visibility (shown_set_integrity / routed_past_not_in_shown_set resolve
          was_shown against this, since the composite stable_name is never in
          shown_questions). Null for a plain (non-matrix) question.
      - name: panel_name
        description: >
          For a paneldynamic cell sub-question (M5.4), the panel element's own name
          — the shown-set entry governing the cell's visibility (a cell is shown iff
          its panel is), which shown_set_integrity / routed_past_not_in_shown_set
          resolve was_shown against. Null for a plain or matrix question.

  - name: dim_question_version
    columns:
      - name: question_version_id
        data_tests: [unique, not_null]
      - name: question_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_question')
                field: question_id
      - name: value_kind
        description: >
          Which polymorphic value column this question feeds (M5.5): option
          (option_key), text (value_text), numeric (value_numeric), or date
          (value_date). Distinguishes a numeric/date `text` input from free text,
          which response_type cannot. The scalar_value_integrity singular test pins
          each fact value slot to it.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['option', 'text', 'numeric', 'date']
      - name: matrix_name
        description: >
          Matrix decomposition (M5.3): the matrix element name, and the cell's
          row (matrix_row) and — for matrixdropdown — column (matrix_column), so a
          matrix can be pivoted without parsing the composite stable_name. All
          null for a plain question.
      - name: matrix_row
      - name: matrix_column
      - name: panel_name
        description: >
          Repeating-group decomposition (M5.4): the panel element name and the
          cell's template-element name (panel_element), so a panel can be pivoted
          without parsing the composite stable_name. Both null for a plain or
          matrix question.
      - name: panel_element

  - name: dim_option
    columns:
      - name: option_key
        data_tests: [unique, not_null]
      - name: value
        # Guards against a choice-less element (free-text/html) leaking into
        # dim_option as a NULL-value row — see int_survey_options' CROSS JOIN.
        data_tests: [not_null]
      - name: question_version_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_question_version')
                field: question_version_id

  - name: fact_response_item
    columns:
      - name: fact_id
        data_tests: [unique, not_null]
      - name: respondent_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_respondent')
                field: respondent_id
      - name: survey_version_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_survey_version')
                field: survey_version_id
      - name: question_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_question')
                field: question_id
      - name: question_version_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_question_version')
                field: question_version_id
      - name: occurrence
        description: >
          1-based panel instance for a paneldynamic cell (M5.4); 1 for every other
          question. Part of the fact grain (invariant 7). Integrity (occurrence > 1
          only on panel cells, contiguous 1..N per respondent-panel) is enforced by
          the paneldynamic_occurrence_integrity singular test.
        data_tests: [not_null]
      - name: option_key
        # nullable for shown-skipped / routed-past rows; when set it must resolve.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_option')
                field: option_key
      - name: value_numeric
        description: >
          Numeric answer (M5.5): a rating, a boolean (1=true / 0=false), or a `text`
          question with inputType number/range. Coerced in int_response_selections;
          a malformed value (only reachable via the public submit endpoint) is null.
          Non-null only on value_kind='numeric' rows (scalar_value_integrity).
      - name: value_date
        description: >
          Date answer (M5.5): a `text` question with inputType date, cast from a
          YYYY-MM-DD answer. Non-null only on value_kind='date' rows
          (scalar_value_integrity).
      - name: value_text
        description: >
          Free-text answer visibility in fact_response_item. Populated only when
          value_kind is text (free-text text/comment, NOT a numeric/date input),
          effective pii_risk is low, and the respondent answered the question. Null
          for high-risk free text and for unanswered rows (shown-skipped or
          routed-past).
      - name: value_text_redacted
        description: >
          True only for high-risk free-text rows whose value_text was withheld
          from this analyst-facing fact table. False for low-risk free text
          (answered and unanswered) and all non-free-text rows.
        data_tests: [not_null]
      - name: rank
        description: >
          1-based ordered position of a ranking-question selection (1 = top
          ranked). Populated only for ranking questions; null for every other
          type and for unanswered routing rows. Integrity (rank only on ranking
          rows, contiguous 1..N per respondent-question) is enforced by the
          ranking_rank_integrity singular test.

  - name: fact_response
    columns:
      - name: response_fact_id
        data_tests: [unique, not_null]
      - name: question_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_question')
                field: question_id
      - name: occurrence
        description: >
          1-based panel instance for a paneldynamic cell (M5.4); 1 for every other
          question. Part of the respondent-question-occurrence grain (invariant 7).
        data_tests: [not_null]
