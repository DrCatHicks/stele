version: 2

# Surrogate keys are deterministic md5 hashes of natural keys (see
# macros/surrogate_key.sql), not the bigint sequences nominally shown in
# design-doc §3.5. Rationale: stable across full-refresh rebuilds, computable
# per-model without a shared sequence, portable to DuckDB, dependency-free.

models:
  - name: dim_respondent
    columns:
      - name: respondent_id
        data_tests: [unique, not_null]

  - name: dim_survey_version
    columns:
      - name: survey_version_id
        data_tests: [unique, not_null]

  - name: dim_question
    columns:
      - name: question_id
        data_tests: [unique, not_null]

  - name: dim_question_version
    columns:
      - name: question_version_id
        data_tests: [unique, not_null]
      - name: question_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_question')
                field: question_id

  - name: dim_option
    columns:
      - name: option_key
        data_tests: [unique, not_null]
      - name: value
        # Guards against a choice-less element (free-text/html) leaking into
        # dim_option as a NULL-value row — see int_survey_options' CROSS JOIN.
        data_tests: [not_null]
      - name: question_version_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_question_version')
                field: question_version_id

  - name: fact_response_item
    columns:
      - name: fact_id
        data_tests: [unique, not_null]
      - name: respondent_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_respondent')
                field: respondent_id
      - name: survey_version_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_survey_version')
                field: survey_version_id
      - name: question_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_question')
                field: question_id
      - name: question_version_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_question_version')
                field: question_version_id
      - name: option_key
        # nullable for shown-skipped / routed-past rows; when set it must resolve.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_option')
                field: option_key
      - name: value_text
        description: >
          Free-text answer visibility in fact_response_item. Populated only when
          question_type is text/comment, effective pii_risk is low, and the
          respondent answered the question. Null for high-risk free text and for
          unanswered rows (shown-skipped or routed-past).
      - name: value_text_redacted
        description: >
          True only for high-risk free-text rows whose value_text was withheld
          from this analyst-facing fact table. False for low-risk free text
          (answered and unanswered) and all non-free-text rows.
        data_tests: [not_null]
      - name: rank
        description: >
          1-based ordered position of a ranking-question selection (1 = top
          ranked). Populated only for ranking questions; null for every other
          type and for unanswered routing rows. Integrity (rank only on ranking
          rows, contiguous 1..N per respondent-question) is enforced by the
          ranking_rank_integrity singular test.

  - name: fact_response
    columns:
      - name: response_fact_id
        data_tests: [unique, not_null]
      - name: question_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_question')
                field: question_id
